version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartstore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartstore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstore-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartstore-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: smartstore
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: change_this_secret_in_production_smartstore2024
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartstore-net
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: smartstore-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - smartstore-net

volumes:
  postgres_data:
  backend_uploads:

networks:
  smartstore-net:
    driver: bridge
